services:
  arangodb:
    image: arangodb:3.12
    container_name: arangodb-graphonaut
    ports:
      - "8529:8529"  # HTTP API (web UI + driver connection)
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
    environment:
      ARANGO_ROOT_PASSWORD: password

volumes:
  arangodb_data:
  arangodb_apps:
